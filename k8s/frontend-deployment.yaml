apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperaturas-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temperaturas-frontend
  template:
    metadata:
      labels:
        app: temperaturas-frontend
    spec:
      containers:
      - name: frontend
        image: paularicarte28/temperaturas-frontend:latest
        ports:
        - containerPort: 3001
        env:
        - name: TEMP_SERVER
          value: "temperaturas-backend:5000"
---
apiVersion: v1
kind: Service
metadata:
  name: temperaturas-frontend
spec:
  type: NodePort
  selector:
    app: temperaturas-frontend
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30001