name: CI/CD Frontend
on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/temperaturas-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/temperaturas-frontend:${{ github.sha }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Actualizar kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name aa2-cluster-temperaturas

      - name: Desplegar en EKS
        run: kubectl apply -f k8s/frontend-deployment.yaml
